    // ── Storage API — Firestore with localStorage fallback ─────────
    // Keys with colons/slashes are sanitised for Firestore doc IDs
    function sanitiseKey(key) {
      return key.replace(/[:/\.#$\[\]]/g, '_');
    }

    window.storage = {
      get: async (key) => {
        // Try Firestore first
        if (db) {
          try {
            const snap = await db.collection('appdata').doc(sanitiseKey(key)).get();
            if (snap.exists) return { value: snap.data().value };
            // Key not in Firestore yet — check localStorage for migration
            const local = localStorage.getItem(key);
            if (local !== null) {
              // Migrate to Firestore silently
              db.collection('appdata').doc(sanitiseKey(key)).set({ value: local, key, migratedAt: new Date() }).catch(()=>{});
              return { value: local };
            }
            return null;
          } catch(e) {
            console.warn('Firestore get failed, using localStorage:', e);
          }
        }
        // Fallback: localStorage
        try {
          const v = localStorage.getItem(key);
          return v !== null ? { value: v } : null;
        } catch(e) { return null; }
      },

      set: async (key, value) => {
        // Write to Firestore AND localStorage (belt + suspenders)
        if (db) {
          try {
            await db.collection('appdata').doc(sanitiseKey(key)).set({
              value,
              key,
              updatedAt: new Date()
            });
            // Mirror to localStorage as offline cache
            try { localStorage.setItem(key, value); } catch(_) {}
            return true;
          } catch(e) {
            console.warn('Firestore set failed, using localStorage only:', e);
          }
        }
        // Fallback: localStorage only
        try { localStorage.setItem(key, value); return true; } catch(e) { return false; }
      },

      // Convenience: bulk export all appdata keys from Firestore
      exportAll: async () => {
        if (!db) return null;
        try {
          const snap = await db.collection('appdata').get();
          const out = {};
          snap.forEach(doc => { out[doc.data().key || doc.id] = doc.data().value; });
          return out;
        } catch(e) { return null; }
      }
    };

const todayISO = () => {
  const d = new Date(); d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
};

const subtractDays = (dateStr, n) => {
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
};

const daysBetween = (a, b) => {
  const ms = new Date(a+'T00:00:00') - new Date(b+'T00:00:00');
  return Math.round(ms / 86400000);
};

const computeUrgency = (autoDeadline, status) => {
  if (status === 'done') return 'Done';
  if (!autoDeadline)     return 'No date';
  const d = daysBetween(autoDeadline, todayISO());
  if (d < 0)  return 'PAST DUE';
  if (d === 0) return 'Due Today';
  if (d === 1) return 'Due Tomorrow';
  if (d <= 3)  return 'Better Start Soon';
  return 'On Track';
};

    setTimeout(()=>setNotice(null),3500);
  };

  // ── Loading gate ─────────────────────────
  if (!loaded) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#faf7f2',fontFamily:'system-ui'}}>
        <span style={{color:'#6b6660',fontSize:14}}>Loading…</span>
      </div>
    );
  }

  // ── Save status pill ─────────────────────
  const StatusPill = () => {
    if (storeSt==='offline') return <Pill icon={<WifiOff size={11}/>} label="Session only" color="#a16207"/>;
    if (saveSt==='saving')   return <Pill icon={<RefreshCw size={11} style={{animation:'spin 1s linear infinite'}}/>} label="Saving…" color="#6b6660"/>;
    if (saveSt==='error')    return <Pill icon={<WifiOff size={11}/>} label="Save failed" color="#b91c1c"/>;
    if (saveSt==='saved')    return <Pill icon={<CheckCircle2 size={11}/>} label="Saved" color="#3d5a3d"/>;
    return <Pill icon={<Wifi size={11}/>} label="Auto-saving on" color="#3d5a3d"/>;
  };

  const VIEWS = {
    today:     <TodayView    log={todayLog} updateLog={updateTodayLog} tasks={sorted} allTasks={tasks} setTasks={setTasks}/>,
    tasks:     <TasksView    tasks={sorted} allTasks={tasks} projects={projects} setTasks={setTasks}/>,
    projects:  <ProjectsView projects={projects} tasks={tasks} setProjects={setProjects} setTasks={setTasks}/>,
    templates: <TemplatesView/>,
    reflect:   <ReflectView  logs={logs} tasks={enriched}/>,
  };

  return (
    <div style={{minHeight:'100vh',background:'linear-gradient(180deg,#faf7f2 0%,#f4ede0 100%)',fontFamily:'"DM Sans",system-ui,sans-serif',color:'#1a1814'}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        .fd{font-family:'Fraunces',Georgia,serif}
        .fm{font-family:'JetBrains Mono',monospace}
        .ink{color:#1a1814}.mute{color:#6b6660}
        .card{background:#fffdf9;border:1px solid #e8e0d0;border-radius:16px}
        .soft{background:#faf7f2}
        input,textarea,select{font-family:inherit}
        input:focus,textarea:focus,select:focus{outline:2px solid #3d5a3d;outline-offset:1px}
        @keyframes spin{to{transform:rotate(360deg)}}
      `}</style>

      <div style={{maxWidth:720,margin:'0 auto',padding:'24px 16px 120px'}}>

        {/* HEADER */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:20}}>
          <div>
            <div style={{fontSize:11,color:'#6b6660',textTransform:'uppercase',letterSpacing:'0.1em'}}>
              Good {greeting()}, Nikhil
            </div>
            <h1 className="fd" style={{fontSize:38,fontWeight:400,letterSpacing:'-0.02em',margin:'2px 0 4px'}}>
              Kaizen
            </h1>
            <StatusPill/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginTop:4}}>
            <input type="file" accept="application/json" ref={fileRef} onChange={doImport} style={{display:'none'}}/>
            <button onClick={()=>fileRef.current?.click()} style={ghostBtn}>Load</button>
            <button onClick={doExport} style={solidBtn}><Download size={12}/> Backup</button>
          </div>
        </div>

        {/* Offline warning */}
        {storeSt==='offline' && (
          <div style={{...alertBox, background:'#fffbeb',borderColor:'#fde68a',color:'#78350f',marginBottom:16}}>
            Auto-save unavailable. Hit <strong>Backup</strong> before closing the tab.
          </div>
        )}

        {/* Flash notice */}
        {notice && (
          <div style={{...alertBox,
            background: notice.kind==='ok'?'#f0fdf4':'#fef2f2',
            borderColor: notice.kind==='ok'?'#bbf7d0':'#fecaca',
            color: notice.kind==='ok'?'#14532d':'#7f1d1d',
            marginBottom:16
          }}>{notice.text}</div>
        )}

        {/* MAIN VIEW */}
        {VIEWS[view]}
      </div>

      {/* BOTTOM NAV */}
      <nav style={{
        position:'fixed',bottom:0,left:0,right:0,
        background:'#fffdf9',borderTop:'1px solid #e8e0d0',
        paddingBottom:'env(safe-area-inset-bottom)'
      }}>
        <div style={{maxWidth:720,margin:'0 auto',display:'flex'}}>
          {[
            {id:'today',     label:'Today',    I:Sun},
            {id:'tasks',     label:'Tasks',    I:CheckCircle2},
            {id:'projects',  label:'Projects', I:Layers},
            {id:'templates', label:'Specs',    I:BookOpen},
            {id:'reflect',   label:'Reflect',  I:RotateCcw},
          ].map(({id,label,I})=>{
            const active = view===id;
            return (
              <button key={id} onClick={()=>setView(id)} style={{
                flex:1,display:'flex',flexDirection:'column',alignItems:'center',
                padding:'10px 4px',border:'none',background:'transparent',cursor:'pointer',
                color: active?'#3d5a3d':'#6b6660'
              }}>
                <I size={20} strokeWidth={active?2:1.5}/>
                <span style={{fontSize:10,marginTop:3,fontWeight:active?600:400}}>{label}</span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

// shared button styles
const ghostBtn = {
  fontSize:12,color:'#6b6660',display:'flex',alignItems:'center',gap:4,
  padding:'6px 12px',borderRadius:99,border:'1px solid #e8e0d0',
  background:'#fffdf9',cursor:'pointer'
};
const solidBtn = {
  fontSize:12,color:'#faf7f2',display:'flex',alignItems:'center',gap:4,
  padding:'6px 12px',borderRadius:99,border:'none',
  background:'#3d5a3d',cursor:'pointer'
};
const alertBox = { fontSize:12,padding:'8px 12px',borderRadius:8,border:'1px solid' };

function Pill({icon,label,color}) {
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,color}}>
      {icon}{label}
    </span>
  );
}

// ─────────────────────────────────────────────────────
// TODAY VIEW
// ─────────────────────────────────────────────────────

function TodayView({ log, updateLog, tasks, allTasks, setTasks }) {
  const [doneInput,    setDoneInput]    = useState('');
  const [brainOpen,    setBrainOpen]    = useState(false);
  const [reflectOpen,  setReflectOpen]  = useState(false);

  const addDone = () => {
    const text = doneInput.trim();
    if (!text) return;
    updateLog({ done: [...(log.done||[]), {id:uid(),text,at:new Date().toISOString()}] });
    setDoneInput('');
  };

  const removeDone = id => updateLog({ done:(log.done||[]).filter(d=>d.id!==id) });

  const toggleTask = id =>
    setTasks(allTasks.map(t => t.id===id ? {...t,status:t.status==='done'?'open':'done'} : t));

  const urgent    = tasks.filter(t=>['PAST DUE','Due Today','Due Tomorrow'].includes(t.urgency));
  const startSoon = tasks.filter(t=>t.urgency==='Better Start Soon');

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* Highlight + micro */}
      <div className="card" style={{padding:20}}>
        <div style={sectionLabel}>The one thing today</div>
        <input
          value={log.highlight||''}
          onChange={e=>updateLog({highlight:e.target.value})}
          placeholder="If only one thing happens, what makes today a win?"
          style={{...ghostInput,fontSize:20,fontFamily:'Fraunces,Georgia,serif',fontWeight:400,marginTop:6}}
        />
        <div style={{borderTop:'1px solid #e8e0d0',marginTop:16,paddingTop:14}}>
          <div style={{...sectionLabel,display:'flex',alignItems:'center',gap:4}}>
            <Zap size={11}/> Smallest first move
          </div>
          <input
            value={log.micro||''}
            onChange={e=>updateLog({micro:e.target.value})}
            placeholder="Not the goal — the first physical step."
            style={{...ghostInput,fontSize:14,marginTop:6}}
          />
        </div>
      </div>

      {/* Done list */}
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={sectionLabel}>Ta-da list</div>
          <span className="fm" style={{fontSize:11,color:'#6b6660'}}>{(log.done||[]).length} wins</span>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <input
            value={doneInput}
            onChange={e=>setDoneInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addDone()}
            placeholder="What just got done?"
            style={{flex:1,padding:'8px 12px',borderRadius:10,border:'1px solid #e8e0d0',fontSize:14,background:'#faf7f2'}}
          />
          <button onClick={addDone} style={{...solidBtn,padding:'8px 12px',borderRadius:10}}>
            <Plus size={16}/>
          </button>
        </div>
        <ul style={{listStyle:'none',padding:0,margin:0,display:'flex',flexDirection:'column',gap:6}}>
          {(log.done||[]).length===0 && (
            <li style={{fontSize:13,color:'#6b6660',fontStyle:'italic'}}>
              Nothing yet — but you've already done more than you think.
            </li>
          )}
          {(log.done||[]).slice().reverse().map(d=>(
            <li key={d.id} style={{display:'flex',alignItems:'flex-start',gap:8}}>
              <CheckCircle2 size={15} style={{color:'#3d5a3d',flexShrink:0,marginTop:2}}/>
              <span style={{flex:1,fontSize:13,lineHeight:1.4}}>{d.text}</span>
              <button onClick={()=>removeDone(d.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#6b6660',padding:0}}>
                <X size={13}/>
              </button>
            </li>
          ))}
        </ul>
      </div>

      {/* Urgent tasks */}
      {urgent.length>0 && (
        <div>
          <div style={{...sectionLabel,paddingLeft:4,marginBottom:8}}>Needs you now</div>
          {urgent.map(t=><TaskRow key={t.id} task={t} onToggle={()=>toggleTask(t.id)}/>)}
        </div>
      )}
      {startSoon.length>0 && (
        <div>
          <div style={{...sectionLabel,paddingLeft:4,marginBottom:8,marginTop:4}}>Better start soon</div>
          {startSoon.map(t=><TaskRow key={t.id} task={t} onToggle={()=>toggleTask(t.id)}/>)}
        </div>
      )}
      {tasks.length===0 && (
        <div style={{...emptyState}}>
          No tasks. Add a project → auto-builds your task chain.
        </div>
      )}

      {/* Brain dump */}
      <Collapsible open={brainOpen} setOpen={setBrainOpen} label="Brain dump" icon={<FileText size={12}/>}>
        <textarea
          value={log.brainDump||''}
          onChange={e=>updateLog({brainDump:e.target.value})}
          placeholder="Empty the head onto the page. No structure required."
          rows={6}
          style={{...textArea}}
        />
      </Collapsible>

      {/* Reflection */}
      <Collapsible open={reflectOpen} setOpen={setReflectOpen} label="End-of-day reflection" icon={<RotateCcw size={12}/>}>
        <textarea
          value={log.reflection||''}
          onChange={e=>updateLog({reflection:e.target.value})}
          placeholder="What worked? What didn't? One adjustment for tomorrow."
          rows={4}
          style={{...textArea}}
        />
      </Collapsible>
    </div>
  );
}

function Collapsible({open,setOpen,label,icon,children}) {
  return (
    <div className="card" style={{overflow:'hidden'}}>
      <button onClick={()=>setOpen(!open)} style={{
        width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'14px 20px',background:'none',border:'none',cursor:'pointer',
      }}>
        <span style={{...sectionLabel,display:'flex',alignItems:'center',gap:6}}>{icon}{label}</span>
        {open ? <ChevronDown size={15} style={{color:'#6b6660'}}/> : <ChevronRight size={15} style={{color:'#6b6660'}}/>}
      </button>
      {open && <div style={{padding:'0 20px 20px'}}>{children}</div>}
    </div>
  );
}

function TaskRow({task,onToggle}) {
  const sp = SPRINTS.find(s=>s.id===task.sprint);
  return (
    <div className="card" style={{padding:'14px 16px',display:'flex',gap:12,alignItems:'flex-start',marginBottom:8}}>
      <button onClick={onToggle} style={{background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2,flexShrink:0}}>
        {task.status==='done'
          ? <CheckCircle2 size={20} style={{color:'#3d5a3d'}}/>
          : <Circle      size={20} style={{color:'#6b6660'}}/>}
      </button>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
          <span style={{fontSize:13,lineHeight:1.35,textDecoration:task.status==='done'?'line-through':'none',color:task.status==='done'?'#6b6660':'#1a1814'}}>
            {task.name}
          </span>
          <span className={urgencyStyle(task.urgency)} style={{fontSize:10,padding:'2px 8px',borderRadius:99,border:'1px solid',whiteSpace:'nowrap',flexShrink:0}}>
            {task.urgency}
          </span>
        </div>
        <div style={{marginTop:4,display:'flex',flexWrap:'wrap',gap:'0 8px',fontSize:11,color:'#6b6660'}}>
          <span className="fm">{fmtDate(task.autoDeadline)}</span>
          <span>·</span>
          <span style={{maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{task.projectName}</span>
          {sp&&<><span>·</span><span>{sp.short}</span></>}
          {task.est&&<><span>·</span><span className="fm">~{task.est}m</span></>}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// TASKS VIEW
// ─────────────────────────────────────────────────────

function TasksView({tasks,allTasks,projects,setTasks}) {
  const [filter,  setFilter]  = useState('open');
  const [editing, setEditing] = useState(null);

  const toggleTask = id =>
    setTasks(allTasks.map(t=>t.id===id?{...t,status:t.status==='done'?'open':'done'}:t));

  const saveTask  = (id,patch) => { setTasks(allTasks.map(t=>t.id===id?{...t,...patch}:t)); setEditing(null); };
  const deleteTask = id => { setTasks(allTasks.filter(t=>t.id!==id)); setEditing(null); };

  const filtered = filter==='all'  ? tasks
    : filter==='open' ? tasks.filter(t=>t.status!=='done')
    : tasks.filter(t=>t.sprint===filter);

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:12}}>
        <h2 className="fd" style={{fontSize:28,fontWeight:400,margin:0}}>Tasks</h2>
        <span className="fm" style={{fontSize:11,color:'#6b6660'}}>{filtered.length}</span>
      </div>

      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:4,marginBottom:16}}>
        {[{id:'all',label:'All'},{id:'open',label:'Open'},...SPRINTS.map(s=>({id:s.id,label:s.short}))].map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{
            padding:'5px 12px',borderRadius:99,fontSize:12,whiteSpace:'nowrap',cursor:'pointer',
            ...(filter===f.id
              ? {background:'#1a1814',color:'#faf7f2',border:'none'}
              : {background:'none',color:'#6b6660',border:'1px solid #e8e0d0'})
          }}>{f.label}</button>
        ))}
      </div>

      {filtered.length===0 && <div style={emptyState}>No tasks here.</div>}
      {filtered.map(t => editing===t.id
        ? <TaskEditor key={t.id} task={t} projects={projects} onSave={p=>saveTask(t.id,p)} onCancel={()=>setEditing(null)} onDelete={()=>deleteTask(t.id)}/>
        : (
          <div key={t.id} style={{position:'relative'}}>
            <TaskRow task={t} onToggle={()=>toggleTask(t.id)}/>
            <button onClick={()=>setEditing(t.id)} style={{
              position:'absolute',top:12,right:44,background:'none',border:'none',cursor:'pointer',color:'#6b6660',opacity:0.5
            }}>
              <Edit3 size={13}/>
            </button>
          </div>
        )
      )}
    </div>
  );
}

function TaskEditor({task,projects,onSave,onCancel,onDelete}) {
  const [name,    setName]    = useState(task.name);
  const [ld,      setLd]      = useState(task.leadDays);
  const [sprint,  setSprint]  = useState(task.sprint);
  const [est,     setEst]     = useState(task.est||task.estimatedTime||30);
  const [actual,  setActual]  = useState(task.actualTime||'');
  const [projId,  setProjId]  = useState(task.projectId);
  const [conf,    setConf]    = useState(false);

  return (
    <div className="card" style={{padding:16,marginBottom:8}}>
      <input value={name} onChange={e=>setName(e.target.value)}
        style={{...ghostInput,fontSize:14,fontWeight:600,borderBottom:'1px solid #e8e0d0',paddingBottom:8,marginBottom:12,width:'100%'}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
        {[
          {label:'Project', el:<select value={projId} onChange={e=>setProjId(e.target.value)} style={selectStyle}>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>},
          {label:'Sprint',  el:<select value={sprint} onChange={e=>setSprint(e.target.value)} style={selectStyle}>
            {SPRINTS.map(s=><option key={s.id} value={s.id}>{s.short}</option>)}</select>},
          {label:'Lead days',el:<input type="number" value={ld} onChange={e=>setLd(+e.target.value||0)} style={{...selectStyle,fontFamily:'monospace'}}/>},
          {label:'Est (min)',el:<input type="number" value={est} onChange={e=>setEst(+e.target.value||0)} style={{...selectStyle,fontFamily:'monospace'}}/>},
        ].map(({label,el},i)=>(
          <label key={i} style={{fontSize:11}}>
            <span style={{color:'#6b6660',display:'block',marginBottom:3}}>{label}</span>
            {el}
          </label>
        ))}
        <label style={{fontSize:11,gridColumn:'span 2'}}>
          <span style={{color:'#6b6660',display:'block',marginBottom:3}}>Actual min (fill in after)</span>
          <input type="number" value={actual} onChange={e=>setActual(e.target.value)} style={{...selectStyle,fontFamily:'monospace',width:'100%'}}/>
        </label>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onSave({name,leadDays:ld,sprint,estimatedTime:est,est,actualTime:actual?+actual:null,projectId:projId})}
          style={{...solidBtn,flex:1,justifyContent:'center',borderRadius:10,padding:'9px'}}>
          <Save size={13}/> Save
        </button>
        <button onClick={onCancel} style={{...ghostBtn,borderRadius:10,padding:'9px 14px'}}>Cancel</button>
        {conf
          ? <button onClick={onDelete} style={{padding:'9px 14px',borderRadius:10,background:'#fee2e2',color:'#991b1b',border:'none',cursor:'pointer',fontSize:13}}>Sure?</button>
          : <button onClick={()=>setConf(true)} style={{padding:'9px 12px',borderRadius:10,border:'1px solid #fecaca',background:'none',color:'#dc2626',cursor:'pointer'}}>
              <Trash2 size={14}/>
            </button>
        }
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────
// PROJECTS VIEW
// ─────────────────────────────────────────────────────

function ProjectsView({projects,tasks,setProjects,setTasks}) {
  const [adding,  setAdding]  = useState(false);
  const [editing, setEditing] = useState(null);
  const [confDel, setConfDel] = useState(null);

  const addProject = ({name,archetype,finalDeadline}) => {
    const id = uid();
    setProjects([...projects,{id,name,archetype,finalDeadline,status:'active',createdAt:new Date().toISOString()}]);
    const newTasks = (TEMPLATES[archetype]||[]).map(t=>({
      id:uid(),projectId:id,name:t.name,leadDays:t.leadDays,sprint:t.sprint,
      estimatedTime:t.est,est:t.est,actualTime:null,status:'open',createdAt:new Date().toISOString()
    }));
    setTasks([...tasks,...newTasks]);
    setAdding(false);
  };

  const delProject = id => {
    setProjects(projects.filter(p=>p.id!==id));
    setTasks(tasks.filter(t=>t.projectId!==id));
    setConfDel(null);
  };

  const stats = projects.map(p=>{
    const pt = tasks.filter(t=>t.projectId===p.id);
    const done = pt.filter(t=>t.status==='done').length;
    return {...p,total:pt.length,done,pct:pt.length?Math.round(done/pt.length*100):0};
  });

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:16}}>
        <h2 className="fd" style={{fontSize:28,fontWeight:400,margin:0}}>Projects</h2>
        <button onClick={()=>setAdding(true)} style={{...solidBtn,borderRadius:99}}>
          <Plus size={14}/> New
        </button>
      </div>

      {adding && <ProjectForm onSave={addProject} onCancel={()=>setAdding(false)}/>}

      {stats.length===0&&!adding && (
        <div style={emptyState}>
          No projects yet. Add one real live thing — Premera call, DSGN F130, blood panel.
        </div>
      )}
      {stats.map(p=> editing===p.id
        ? <ProjectEditor key={p.id} project={p} onSave={patch=>{setProjects(projects.map(pr=>pr.id===p.id?{...pr,...patch}:pr));setEditing(null);}} onCancel={()=>setEditing(null)}/>
        : (
        <div key={p.id} className="card" style={{padding:16,marginBottom:8}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>
              <div style={{fontSize:11,color:'#6b6660',marginTop:3,display:'flex',gap:6}}>
                <span>{p.archetype}</span><span>·</span>
                <span className="fm">due {fmtDate(p.finalDeadline)}</span>
              </div>
            </div>
            {confDel===p.id ? (
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>delProject(p.id)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,background:'#fee2e2',color:'#991b1b',border:'none',cursor:'pointer'}}>Delete</button>
                <button onClick={()=>setConfDel(null)} style={{fontSize:11,padding:'4px 10px',borderRadius:6,background:'none',color:'#6b6660',border:'1px solid #e8e0d0',cursor:'pointer'}}>Cancel</button>
              </div>
            ):(
              <div style={{display:'flex',gap:4}}>
                <button onClick={()=>setEditing(p.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#6b6660'}}>
                  <Edit3 size={14}/>
                </button>
                <button onClick={()=>setConfDel(p.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#6b6660'}}>
                  <Trash2 size={14}/>
                </button>
              </div>
            )}
          </div>
          <div style={{marginTop:12,display:'flex',alignItems:'center',gap:8}}>
            <div style={{flex:1,height:4,background:'#faf7f2',borderRadius:4,overflow:'hidden'}}>
              <div style={{height:'100%',width:`${p.pct}%`,background:'#3d5a3d',borderRadius:4}}/>
            </div>

// REFLECT VIEW
// ─────────────────────────────────────────────────────

function ReflectView({logs,tasks}) {
  const dates = Object.keys(logs).sort().reverse().slice(0,14);
  const last7  = dates.slice(0,7);

  const hlDays = last7.filter(d=>{
    const l=logs[d];
    return l?.highlight&&(l?.done||[]).length>0;
  }).length;

  const timed = tasks.filter(t=>t.status==='done'&&t.actualTime&&(t.estimatedTime||t.est));
  const avgVar = timed.length
    ? Math.round(timed.reduce((s,t)=>s+(t.actualTime-(t.estimatedTime||t.est)),0)/timed.length)
    : null;

  return (
    <div>
      <h2 className="fd" style={{fontSize:28,fontWeight:400,marginBottom:4}}>Reflect</h2>
      <p style={{fontSize:12,color:'#6b6660',marginBottom:16}}>Patterns matter more than any single day.</p>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        {[
          {label:'Highlight days',  value:`${hlDays}/7`,    sub:'last 7 with a win'},
          {label:'Time variance',   value: avgVar===null?'—':`${avgVar>0?'+':''}${avgVar}m`, sub:'avg over/under'},
        ].map(c=>(
          <div key={c.label} className="card" style={{padding:16}}>
            <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em',color:'#6b6660'}}>{c.label}</div>
            <div className="fd" style={{fontSize:32,fontWeight:400,margin:'4px 0 2px'}}>{c.value}</div>
            <div style={{fontSize:10,color:'#6b6660'}}>{c.sub}</div>
          </div>
        ))}
      </div>

      <div style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.1em',color:'#6b6660',marginBottom:8,paddingLeft:2}}>
        Recent days
      </div>
      {dates.length===0 && <div style={emptyState}>No logs yet.</div>}
      {dates.map(d=>{
        const l=logs[d];
        return (
          <div key={d} className="card" style={{padding:16,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span className="fm" style={{fontSize:11,color:'#6b6660'}}>{fmtDate(d)}</span>
              <span style={{fontSize:11,color:'#6b6660'}}>{(l.done||[]).length} wins</span>
            </div>
            {l.highlight&&<div style={{fontSize:13,marginBottom:4}}>
              <span style={{fontSize:10,textTransform:'uppercase',letterSpacing:'0.08em',color:'#6b6660'}}>Highlight · </span>
              {l.highlight}
            </div>}
            {l.reflection&&<div style={{fontSize:12,color:'#6b6660',fontStyle:'italic',lineHeight:1.5,marginTop:6}}>{l.reflection}</div>}
          </div>
        );
      })}
    </div>
  );
}

function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}
function calcTotal(meals) {
  return meals.reduce((s, m) => s + m.items.reduce((ss, i) => ss + (i.kcal || 0), 0), 0);
}
function calcProtein(meals) {
  let t = 0;
  meals.forEach(m => m.items.forEach(i => {
    if (i.notes) { const x = i.notes.match(/~?(\d+(?:\.\d+)?)g protein/); if (x) t += parseFloat(x[1]); }
  }));
  return Math.round(t);
}
function getTotalBurn(h) {
  if (h.active_kcal && h.basal_kcal) return Math.round(h.active_kcal + h.basal_kcal);
  return 2700;
}

function MealCard({ meal, accent, bg }) {
  const total = meal.items.reduce((s, i) => s + (i.kcal || 0), 0);

    <div style={{ background: bg, borderRadius: 14, padding: "16px 18px", marginBottom: 12, borderLeft: `4px solid ${accent}`, boxShadow: meal.protein_highlight ? `0 0 0 2px ${accent}44` : "0 2px 8px rgba(0,0,0,0.05)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
        <div>
          <span style={{ fontFamily: "Georgia, serif", fontWeight: 700, fontSize: 14, color: "#1a1a2e" }}>{meal.label}</span>
          <span style={{ fontSize: 11, color: "#999", marginLeft: 8 }}>{meal.time}</span>
        </div>
        <span style={{ fontWeight: 800, fontSize: 15, color: accent }}>{total} kcal</span>
      </div>
      {meal.items.map((item, i) => (
        <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, color: "#444", padding: "4px 0", borderBottom: i < meal.items.length - 1 ? "1px dashed #e0e0e0" : "none" }}>

  );
}

const Badge = ({ children, color = COLORS.accent, bg }) => (
  <span style={{
    display: "inline-block", padding: "2px 10px", borderRadius: 999,

);

const adherenceBadge = (status) => {
  const map = {
    consistent: { label: "Consistent", color: COLORS.green, bg: COLORS.greenMuted },
    partial: { label: "Partial", color: COLORS.amber, bg: COLORS.amberMuted },
    improving: { label: "Improving", color: COLORS.cyan, bg: "rgba(34,211,238,0.15)" },
    variable: { label: "Variable", color: COLORS.amber, bg: COLORS.amberMuted },
    lapsed: { label: "Lapsed", color: COLORS.red, bg: COLORS.redMuted },
    poor: { label: "Poor", color: COLORS.red, bg: COLORS.redMuted },
    stopped: { label: "Stopped", color: COLORS.textMuted, bg: "rgba(156,163,175,0.15)" },
    refused: { label: "Refused", color: COLORS.purple, bg: COLORS.purpleMuted },
  };
  const m = map[status] || map.variable;
  return <Badge color={m.color} bg={m.bg}>{m.label}</Badge>;
};

const habitBadge = (status) => {
  const map = {
    established: { label: "Established", color: COLORS.green, bg: COLORS.greenMuted },

  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "8px 12px", fontSize: 12 }}>

function Timer({ seconds, onComplete, small }) {
  const [remaining, setRemaining] = useState(seconds);
  const [running, setRunning] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    setRemaining(seconds);
    setRunning(false);
    if (intervalRef.current) clearInterval(intervalRef.current);
  }, [seconds]);

  useEffect(() => {
    if (running && remaining > 0) {
      intervalRef.current = setInterval(() => {
        setRemaining(r => {
          if (r <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            onComplete?.();
            return 0;
          }
          return r - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
  }, [running]);

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const pct = ((seconds - remaining) / seconds) * 100;
  const sz = small ? 80 : 120;
  const inner = small ? 64 : 100;

  return (
    <div style={{ textAlign: "center", margin: small ? "10px 0" : "16px 0" }}>
      <div style={{
        position: "relative", width: sz, height: sz, margin: "0 auto", borderRadius: "50%",
        background: `conic-gradient(#FF6B6B ${pct}%, #2a2a2a ${pct}%)`,
        display: "flex", alignItems: "center", justifyContent: "center"
      }}>
        <div style={{
          width: inner, height: inner, borderRadius: "50%", background: "#1a1a1a",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "'JetBrains Mono', monospace", fontSize: small ? 20 : 28, color: "#fff", fontWeight: 700
        }}>
          {mins}:{secs.toString().padStart(2, "0")}
        </div>
      </div>
      <button onClick={() => setRunning(r => !r)} style={{
        marginTop: 8, padding: small ? "6px 16px" : "8px 24px", border: "2px solid #FF6B6B",
        background: running ? "#FF6B6B" : "transparent",
        color: running ? "#1a1a1a" : "#FF6B6B",
        borderRadius: 20, cursor: "pointer", fontWeight: 700, fontSize: small ? 11 : 14,
        fontFamily: "'Space Mono', monospace", letterSpacing: 1, transition: "all 0.2s"
      }}>
        {running ? "PAUSE" : remaining === seconds ? "START" : remaining === 0 ? "DONE ✓" : "RESUME"}
      </button>
    </div>
  );
}

      // Get token via Google Identity Services
      await new Promise((resolve, reject) => {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: DRIVE_CLIENT_ID,
          scope: DRIVE_SCOPE,
          callback: async (tokenResponse) => {
            if (tokenResponse.error) { reject(tokenResponse.error); return; }
            const token = tokenResponse.access_token;
            setBackupStatus('Gathering data...');

            // Build backup JSON
            const backup = { timestamp: new Date().toISOString(), data: {} };
            for (const key of STORAGE_KEYS) {
              try { const r = await window.storage.get(key); if (r?.value) backup.data[key] = r.value; } catch(e) {}
            }
            const content = JSON.stringify(backup, null, 2);
            const filename = "nikhil-world-backup-" + new Date().toISOString().slice(0,10) + ".json";

            setBackupStatus('Finding/creating folder in Drive...');

            // Find or create folder
            let folderId = null;
            const folderSearch = await fetch(
              `https://www.googleapis.com/drive/v3/files?q=name='${DRIVE_FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
              { headers: { Authorization: `Bearer ${token}` } }
            ).then(r => r.json());

            if (folderSearch.files?.length > 0) {
              folderId = folderSearch.files[0].id;
            } else {
              const newFolder = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: DRIVE_FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' })
              }).then(r => r.json());
              folderId = newFolder.id;
            }

            setBackupStatus('Uploading to Drive...');

            // Upload file
            const meta = { name: filename, parents: [folderId] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
            form.append('file', new Blob([content], { type: 'application/json' }));

            const upload = await fetch(
              'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
              { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form }
            ).then(r => r.json());

            if (upload.id) {
              setBackupStatus(`✅ Synced to Drive → "${DRIVE_FOLDER_NAME}/${filename}"`);
            } else {
              setBackupStatus('❌ Upload failed — try Download Backup instead.');
            }
            setTimeout(() => setBackupStatus(''), 6000);
            resolve();
          },
        });
        client.requestAccessToken();
      });
    } catch(e) {
      setBackupStatus('❌ Drive sync failed: ' + e);
      setTimeout(() => setBackupStatus(''), 5000);
    }
  };

  const importSystem = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setBackupStatus('Restoring data...');
    const r = new FileReader();
    r.onload = async (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.data) {
          for (const [k, v] of Object.entries(d.data)) await window.storage.set(k, v);
          setBackupStatus('Restored! Refresh to reload data.');
        } else { setBackupStatus('Error: Invalid backup file.'); }
      } catch { setBackupStatus('Error reading file.'); }
    };
    r.readAsText(file);
    e.target.value = '';
  };

  const paneStyle = (id) => ({
    flex: 1, minHeight: 0, overflowY: 'auto',
    display: activeTab === id ? 'block' : 'none'
  });

  return (
    <div style={{ background: '#0f0f0f', height: '100vh', width: '100%', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>

      <div style={paneStyle('roulette')}><CreativeRoulette /></div>
      <div style={paneStyle('kaizen')}><KaizenApp /></div>
      <div style={paneStyle('food')}><FoodLog /></div>
      <div style={paneStyle('health')}><HealthDashboard /></div>

      <div style={{ ...paneStyle('system'), display: activeTab === 'system' ? 'flex' : 'none', flexDirection: 'column', padding: 24, color: '#eee', fontFamily: "'Space Mono', monospace" }}>
        <h2 style={{ fontSize: 22, color: '#FF6B6B', marginBottom: 16 }}>System Maintenance</h2>
        <p style={{ fontSize: 13, color: '#888', marginBottom: 24, lineHeight: 1.6 }}>
          Pulls all raw data directly from browser storage. Run weekly and drop the file into Google Drive as "Elite Maintenance."
        </p>
        <div style={{ background: '#1a1a1a', padding: 20, borderRadius: 12, border: '1px solid #333', marginBottom: 16 }}>
          <button onClick={exportSystem} style={{
            width: '100%', padding: 16, background: '#4ECDC4', color: '#0f0f0f', border: 'none',
            borderRadius: 8, fontWeight: 700, fontSize: 14, fontFamily: 'inherit', cursor: 'pointer',
            letterSpacing: 1, marginBottom: 12
          }}>⬇️ DOWNLOAD BACKUP</button>
          <button onClick={syncToDrive} style={{
            width: "100%", padding: 16, background: "#4285F4", color: "#fff", border: "none",
            borderRadius: 8, fontWeight: 700, fontSize: 14, fontFamily: "inherit", cursor: "pointer",
            letterSpacing: 1, marginBottom: 12
          }}>☁️ SYNC TO GOOGLE DRIVE</button>
          <input type="file" accept=".json" ref={fileRef} onChange={importSystem} style={{ display: 'none' }} />
          <button onClick={() => fileRef.current?.click()} style={{
            width: '100%', padding: 16, background: 'transparent', color: '#ccc',
            border: '1px solid #555', borderRadius: 8, fontWeight: 700, fontSize: 14,
            fontFamily: 'inherit', cursor: 'pointer', letterSpacing: 1
          }}>RESTORE FROM BACKUP</button>
        </div>
        {backupStatus && (
          <div style={{ padding: 12, background: '#0f0f0f', border: '1px solid #4ECDC4', color: '#4ECDC4', borderRadius: 6, fontSize: 12 }}>
            {backupStatus}
          </div>
        )}
      </div>

      <nav style={{ background: '#1a1a1a', borderTop: '1px solid #333', paddingBottom: 'env(safe-area-inset-bottom)', flexShrink: 0, position: 'relative', zIndex: 9999 }}>
        <div style={{ maxWidth: 720, margin: '0 auto', display: 'flex' }}>
          {navItems.map(({ id, label, Icon }) => {
            const active = activeTab === id;
            return (
              <button key={id} onClick={() => setActiveTab(id)} style={{
                flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
                padding: '12px 4px', border: 'none', background: 'transparent', cursor: 'pointer',
                color: active ? '#FF6B6B' : '#666', transition: 'color 0.2s'
              }}>
                <Icon size={24} strokeWidth={active ? 2.5 : 1.5} />
                <span style={{ fontSize: 11, marginTop: 4, fontWeight: active ? 700 : 400, letterSpacing: 1, fontFamily: "'Space Mono', monospace" }}>
                  {label}
                </span>
              </button>
            );
          })}
        </div>
      </nav>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
