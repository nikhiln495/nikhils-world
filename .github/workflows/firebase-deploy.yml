name: Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix and write service account JSON
        env:
          SA_RAW: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKHILS_WORLD }}
        run: python3 scripts/fix_sa.py

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project nikhils-world
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
